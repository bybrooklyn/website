<!doctype html>
<html lang="en">
    <head>
        <!-- Meta Tags -->
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta property="og:title" content="{{ title }}" />
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://bybrooklyn.dev" />
        <meta property="og:description" content="{{ description }}" />
        <meta name="theme-color" content="#ecb256" />
        <title>{{ title }} - Brook's website</title>

        <!-- Favicon -->
        <!-- <link rel="apple-touch-icon" sizes="180x180" href="/assets/icons/apple-touch-icon.png" />
        <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-32x32.png" />
        <link rel="icon" type="image/png" sizes="16x16" href="/assets/icons/favicon-16x16.png" /> -->

        <!-- Stylesheets -->
        {{ .zs/styles }}

        <!-- Scripts -->
        {{ .zs/scripts }}
    </head>

    <body>
        <div id="deco" aria-hidden=true>
            <div id="rainbow"></div>
            <div id="triangles"></div>
        </div>
        <div id="upper" role="presentation">
            {{ .zs/components/nav }}
            <div>
                <main><div>{{ content }}</div></main>
                {{ .zs/components/footer }}
            </div>
        </div>
    </body>
</html>
